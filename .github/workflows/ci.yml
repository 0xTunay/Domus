name: CI Espressif

on:
  push:
    branches: [ci/github-actions]
  pull_request:
    branches: [ci/github-actions]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Create sdkconfig.defaults for CI
        run: |
          cat > sdkconfig.defaults << 'EOF'
          CONFIG_WIFI_MANAGER_SSID="ci_test_ssid"
          CONFIG_WIFI_MANAGER_PASSWORD="ci_test_password"
          CONFIG_WIFI_MANAGER_MAX_RETRY=5
          EOF

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.0
          target: esp32
          path: '.'