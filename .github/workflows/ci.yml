name: CI Espressif

on:
  push:
    branches: [ci/github-actions]
  pull_request:
    branches: [ci/github-actions]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware 
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: esp32
          path: '.'
